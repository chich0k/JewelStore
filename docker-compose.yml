name: jewelstore

services:
  postgres:
    image: postgres:16-alpine
    container_name: jewelstore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jewelstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - jewelstore_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jewelstore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jewelstore-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: jewelstore-image
    container_name: jewelstore-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=jewelstore;Username=postgres;Password=postgres"
    ports:
      - "8029:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - jewelstore-net

volumes:
  jewelstore_data:
    driver: local

networks:
  jewelstore-net:
    driver: bridge